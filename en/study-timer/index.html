<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⏱️ Study Timer - Visual Study/Break Timer</title>
  <meta name="description" content="Set your study and break time and watch progress on a circular clock face. A free study timer for elementary students, with a built-in to-do list." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://quick-tools.barofam.com/en/study-timer/" />
  <link rel="alternate" hreflang="ko" href="https://quick-tools.barofam.com/study-timer/" />
  <link rel="alternate" hreflang="en" href="https://quick-tools.barofam.com/en/study-timer/" />
  <link rel="alternate" hreflang="x-default" href="https://quick-tools.barofam.com/study-timer/" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://quick-tools.barofam.com/en/study-timer/" />
  <meta property="og:title" content="Study Timer" />
  <meta property="og:description" content="Set your study and break time and watch progress on a circular clock face. A free study timer for elementary students, with a built-in to-do list." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Study Timer" />
  <meta name="twitter:description" content="Set your study and break time and watch progress on a circular clock face. A free study timer for elementary students, with a built-in to-do list." />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='8' height='8' fill='%236c7cff'/%3E%3Crect x='8' y='8' width='8' height='8' fill='%236c7cff'/%3E%3Crect x='8' width='8' height='8' fill='%23222222'/%3E%3Crect y='8' width='8' height='8' fill='%23222222'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/gnb.css" />
  <link rel="stylesheet" href="../../study-timer/style.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Study Timer",
    "description": "Set your study and break time and watch progress on a circular clock face.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <script src="/gnb.js"></script>
  <section class="tools_header">
    <h1>⏱️ Study Timer</h1>
    <p>Set your study and break time and stay focused!</p>
  </section>

  <div class="ad-slot ad-slot-top">
    <span class="ad-label">Advertisement</span>
  </div>

  <main class="game-main">
    <div class="layout-row">
      <section class="panel timer-panel">
        <h2>Set your time</h2>
        <div class="size-row">
          <label for="studyInput">Study time (min)</label>
          <input type="number" id="studyInput" min="1" max="180" value="50" />
          <label for="breakInput">Break time (min)</label>
          <input type="number" id="breakInput" min="1" max="180" value="10" />
        </div>
        <div class="lock-row">
          <label class="lock-label">
            <input type="checkbox" id="repeatCheck" />
            <span>Repeat</span>
          </label>
        </div>

        <div class="timer-stage">
          <canvas id="timerCanvas" width="280" height="280"></canvas>
          <div class="timer-status">
            <div class="phase-label" id="phaseLabel">Press start</div>
            <div class="time-label" id="timeLabel">50:00</div>
          </div>
        </div>

        <div class="ad-slot ad-slot-inline">
          <span class="ad-label">Advertisement</span>
        </div>

        <div class="button-row">
          <button id="toggleBtn" class="btn btn-primary">Start</button>
          <button id="resetBtn" class="btn btn-secondary" hidden>Reset</button>
        </div>
      </section>

      <section class="panel todo-panel">
        <h2>To-do List</h2>
        <div class="todo-input-row">
          <input type="text" id="todoInput" placeholder="Add a task" maxlength="60" />
          <button id="todoAddBtn" class="btn-add-todo">Add</button>
        </div>
        <p class="todo-count" id="todoCount">0/15</p>
        <ul class="todo-list" id="todoList"></ul>
        <button id="todoClearBtn" class="btn btn-secondary todo-clear-btn">Clear All</button>
      </section>
    </div>
  </main>

  <section class="tools_footer">
    A visual study/break timer for elementary students
  </section>

  <div class="ad-slot ad-slot-bottom">
    <span class="ad-label">Advertisement</span>
  </div>

  <script src="/cookie-consent.js"></script>
  <script src="script.js"></script>
</body>
</html>
