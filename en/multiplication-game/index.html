  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Multiplication Practice Game",
    "description": "A free game for elementary students to practice multiplication.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <script src="/gnb.js"></script>
  <section class="tools_header">
    <h1>🎮 Multiplication Practice Game</h1>
    <p>Learn multiplication by solving problems!</p>
  </section>

  <div class="ad-slot ad-slot-top">
    <span class="ad-label">Advertisement</span>
  </div>

  <main class="game-main">
    <!-- Level select screen -->
    <section id="levelSelect" class="panel">
      <h2>Choose a difficulty level</h2>
      <div class="level-grid">
        <button class="level-btn" data-level="1">Level 1</button>
        <button class="level-btn" data-level="2">Level 2</button>
        <button class="level-btn" data-level="3">Level 3</button>
        <button class="level-btn" data-level="4">Level 4</button>
        <button class="level-btn" data-level="5">Level 5</button>
      </div>
    </section>

    <!-- Game screen -->
    <section id="gameScreen" class="panel" hidden>
      <div class="level-indicator">
        <span id="levelLabel">Level 1</span>
        <button class="btn-change" id="changeBtn">Change</button>
      </div>
      <div class="game-status">
        <span id="progressLabel">Question 1/10</span>
        <span id="scoreLabel">Score 0/10</span>
      </div>

      <div class="question" id="questionText">? × ? = ?</div>

      <div class="choices" id="choices"></div>

      <div class="explain" id="explain" hidden>
        <div class="explain-array" id="explainArray"></div>
        <div class="explain-text" id="explainText"></div>
        <button class="btn-next" id="nextBtn">Next question →</button>
      </div>
    </section>

    <!-- Result screen -->
    <section id="resultScreen" class="panel" hidden>
      <h2 id="resultTitle">Game Over!</h2>
      <div class="result-score" id="resultScore">0/10</div>
      <p class="result-message" id="resultMessage"></p>
      <div class="actions">
        <button class="btn-visualize" id="retryBtn">Try the same level again</button>
        <button class="btn-next-level" id="nextLevelBtn">Try the next level</button>
        <button class="btn-reset" id="changeLevelBtn">Choose a different level</button>
      </div>
    </section>
  </main>

  <section class="tools_footer">
    A multiplication practice game for elementary students · Every answer comes with a picture explanation
  </section>

  <div class="ad-slot ad-slot-bottom">
    <span class="ad-label">Advertisement</span>
  </div>

  <script src="/cookie-consent.js"></script>
  <script src="script.js"></script>
</body>
</html>
