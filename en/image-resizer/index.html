<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Resize & Crop Tool</title>
  <meta name="description" content="Crop an image to any area and resize it to any dimensions, free and online." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://quick-tools.barofam.com/en/image-resizer/" />
  <link rel="alternate" hreflang="ko" href="https://quick-tools.barofam.com/image-resizer/" />
  <link rel="alternate" hreflang="en" href="https://quick-tools.barofam.com/en/image-resizer/" />
  <link rel="alternate" hreflang="x-default" href="https://quick-tools.barofam.com/image-resizer/" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://quick-tools.barofam.com/en/image-resizer/" />
  <meta property="og:title" content="Image Resize & Crop Tool" />
  <meta property="og:description" content="Crop an image to any area and resize it to any dimensions, free and online." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Image Resize & Crop Tool" />
  <meta name="twitter:description" content="Crop an image to any area and resize it to any dimensions, free and online." />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='8' height='8' fill='%236c7cff'/%3E%3Crect x='8' y='8' width='8' height='8' fill='%236c7cff'/%3E%3Crect x='8' width='8' height='8' fill='%23222222'/%3E%3Crect y='8' width='8' height='8' fill='%23222222'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="/gnb.css" />
  <link rel="stylesheet" href="../../image-resizer/style.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Image Resize & Crop Tool",
    "description": "Crop an image to any area and resize it to any dimensions, free and online.",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
  <script>window.FORCE_LANG = 'en';</script>
</head>
<body>
  <script src="/gnb.js"></script>
  <div class="container">
    <header>
      <h1 data-i18n="appTitle">Image Resize & Crop Tool</h1>
      <p class="subtitle" data-i18n="appSubtitle">Drag to pick the area you want, then resize it to any size and download.</p>
    </header>

    <div class="ad-slot ad-slot-top">
      <span class="ad-label">Advertisement</span>
    </div>

    <div class="upload-area" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" hidden />
      <p data-i18n="uploadText">Click here or drag and drop an image</p>
      <span class="upload-hint" data-i18n="uploadHint">PNG, JPG, and other image files</span>
    </div>

    <!-- Step 1: crop screen -->
    <section class="workspace" id="cropWorkspace" hidden>
      <h2 class="step-title" data-i18n="cropStepTitle">① Select the area to crop</h2>

      <div class="ratio-options" id="ratioOptions">
        <button class="ratio-btn active" data-ratio="free" data-i18n="ratioFree">Free</button>
        <button class="ratio-btn" data-ratio="1">1:1</button>
        <button class="ratio-btn" data-ratio="1.3333">4:3</button>
        <button class="ratio-btn" data-ratio="0.75">3:4</button>
        <button class="ratio-btn" data-ratio="1.7778">16:9</button>
        <button class="ratio-btn" data-ratio="0.5625">9:16</button>
      </div>

      <div class="crop-stage-wrap">
        <div class="crop-stage" id="cropStage">
          <img id="sourceImage" alt="" draggable="false" />
          <div class="crop-box" id="cropBox">
            <div class="crop-handle" data-handle="nw"></div>
            <div class="crop-handle" data-handle="ne"></div>
            <div class="crop-handle" data-handle="se"></div>
            <div class="crop-handle" data-handle="sw"></div>
          </div>
        </div>
      </div>
      <p class="crop-info" id="cropInfo"></p>

      <div class="ad-slot ad-slot-inline">
        <span class="ad-label">Advertisement</span>
      </div>

      <div class="button-row">
        <button id="applyCropBtn" class="btn btn-primary" data-i18n="applyCropBtn">Apply Crop</button>
        <button id="resetBtn" class="btn btn-secondary" data-i18n="resetBtn">Upload another image</button>
      </div>
    </section>

    <!-- Step 2: resize and download screen -->
    <section class="workspace" id="resizeWorkspace" hidden>
      <h2 class="step-title" data-i18n="resizeStepTitle">② Resize and download</h2>

      <div class="preview-box">
        <img id="resultPreview" alt="" />
        <p class="grid-info" id="resultInfo"></p>
      </div>

      <div class="controls">
        <div class="control-row size-row">
          <label for="widthInput" data-i18n="widthLabel">Width (px)</label>
          <input type="number" id="widthInput" min="1" max="8000" />
          <label for="heightInput" data-i18n="heightLabel">Height (px)</label>
          <input type="number" id="heightInput" min="1" max="8000" />
        </div>
        <div class="control-row lock-row">
          <label class="lock-label">
            <input type="checkbox" id="lockAspect" checked />
            <span data-i18n="lockAspectLabel">Lock aspect ratio</span>
          </label>
        </div>

        <div class="ad-slot ad-slot-inline">
          <span class="ad-label">Advertisement</span>
        </div>

        <div class="button-row">
          <button id="downloadBtn" class="btn btn-primary" data-i18n="downloadBtn">Download</button>
          <button id="backToCropBtn" class="btn btn-secondary" data-i18n="backToCropBtn">Crop again</button>
          <button id="resetBtn2" class="btn btn-secondary" data-i18n="resetBtn">Upload another image</button>
        </div>
      </div>
    </section>

    <div class="ad-slot ad-slot-bottom">
      <span class="ad-label">Advertisement</span>
    </div>

  </div>

  <script src="/cookie-consent.js"></script>
  <script src="../../image-resizer/script.js"></script>
</body>
</html>
