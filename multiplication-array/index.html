  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "곱셈 배열 시각화",
    "description": "곱셈을 점 배열 그림으로 보여주는 초등학생용 무료 온라인 도구입니다.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <script src="/gnb.js"></script>
  <section class="tools_header">
    <h1>✖️ 곱셈 배열 시각화</h1>
    <p>곱셈을 점 배열로 그림처럼 이해해요!</p>
  </section>

  <nav class="tool-nav">
    <a href="./index.html" class="tool-nav-item active">곱셈 시각화</a>
    <a href="../multiplication-game/index.html" class="tool-nav-item">곱셈 연습게임</a>
    <a href="../fraction-visualizer/index.html" class="tool-nav-item">분수 시각화</a>
    <a href="../fraction-game/index.html" class="tool-nav-item">분수 연습게임</a>
    <a href="../study-timer/index.html" class="tool-nav-item">학습 타이머</a>
  </nav>

  <!-- 상단 광고 영역 -->
  <div class="ad-slot ad-slot-top">
    <span class="ad-label">Advertisement</span>
  </div>

  <section class="tools_main">
    <section class="input-section">
      <h2>✏️ 곱할 두 수를 입력해 보세요</h2>

      <div class="num-input-row">
        <div class="num-box">
          <label>첫 번째 수 (행)</label>
          <input type="number" id="numA" min="1" max="12" value="3">
        </div>
        <span class="op-sign">×</span>
        <div class="num-box">
          <label>두 번째 수 (열)</label>
          <input type="number" id="numB" min="1" max="12" value="4">
        </div>
        <span class="eq-sign">=</span>
        <div class="result-badge" id="resultBadge">12</div>
      </div>

      <div class="error-msg" id="errorMsg">⚠️ 1~12 사이의 수를 입력해 주세요.</div>

      <div class="actions">
        <button class="btn-visualize" id="btnVisualize">🎨 그림으로 보기!</button>
        <button class="btn-reset" id="btnReset">초기화</button>
      </div>

      <div class="quick-examples">
        <span>예시:</span>
        <button class="chip" data-a="2" data-b="3">2×3</button>
        <button class="chip" data-a="3" data-b="4">3×4</button>
        <button class="chip" data-a="4" data-b="5">4×5</button>
        <button class="chip" data-a="6" data-b="7">6×7</button>
        <button class="chip" data-a="9" data-b="9">9×9</button>
      </div>
    </section>

    <section id="result">
      <div class="result-title">📊 곱셈 시각화 결과</div>
      <div class="summary-card" id="summaryCard"></div>

      <div class="array-section">
        <h3>🔵 점 배열로 보기</h3>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="basic">기본 배열</button>
          <button class="mode-tab" data-mode="color">행별 색깔</button>
          <button class="mode-tab" data-mode="group">묶음으로 보기</button>
        </div>
        <div id="arrayDisplay"></div>
        <div class="array-legend" id="arrayLegend"></div>
      </div>

      <div class="commutative-section" id="commSection"></div>
      <div class="multiples-section" id="multiplesSection"></div>
    </section>
  </section>

  <section class="tools_footer">
    초등학생을 위한 곱셈 학습 도구 · 배열로 곱셈의 의미를 시각적으로 이해해요
    <div style="margin-top:6px">© barofam</div>
  </section>

  <!-- 하단 광고 영역 -->
  <div class="ad-slot ad-slot-bottom">
    <span class="ad-label">Advertisement</span>
  </div>

  <script src="/cookie-consent.js"></script>
  <script src="script.js"></script>
</body>
</html>
