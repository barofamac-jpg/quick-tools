<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>분수 시각화 도구</title>
  <meta name="description" content="분수를 그림으로 보여주고 최대 3개까지 비교할 수 있는 무료 온라인 도구입니다." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://quick-tools.barofam.com/fraction-visualizer/" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://quick-tools.barofam.com/fraction-visualizer/" />
  <meta property="og:title" content="분수 시각화 도구" />
  <meta property="og:description" content="분수를 그림으로 보여주고 최대 3개까지 비교할 수 있는 무료 온라인 도구입니다." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="분수 시각화 도구" />
  <meta name="twitter:description" content="분수를 그림으로 보여주고 최대 3개까지 비교할 수 있는 무료 온라인 도구입니다." />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='8' height='8' fill='%236c7cff'/%3E%3Crect x='8' y='8' width='8' height='8' fill='%236c7cff'/%3E%3Crect x='8' width='8' height='8' fill='%23222222'/%3E%3Crect y='8' width='8' height='8' fill='%23222222'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="style.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "분수 시각화 도구",
    "description": "분수를 그림으로 보여주고 최대 3개까지 비교할 수 있는 무료 온라인 도구입니다.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="appTitle">분수 시각화 도구</h1>
      <p class="subtitle" data-i18n="appSubtitle">분수를 눈으로 보고 비교해보세요.</p>
    </header>

    <!-- 상단 광고 영역 -->
    <div class="ad-slot ad-slot-top">
      <span class="ad-label">Advertisement</span>
    </div>

    <div class="fraction-cards" id="fractionCards"></div>

    <button id="addFractionBtn" class="btn-add" data-i18n="addFractionBtn">+ 분수 추가</button>

    <div class="presets">
      <p class="presets-label" data-i18n="presetsLabel">추천 분수</p>
      <div class="presets-buttons">
        <button class="preset-btn" data-num="1" data-den="2">1/2</button>
        <button class="preset-btn" data-num="1" data-den="3">1/3</button>
        <button class="preset-btn" data-num="2" data-den="3">2/3</button>
        <button class="preset-btn" data-num="1" data-den="4">1/4</button>
        <button class="preset-btn" data-num="3" data-den="4">3/4</button>
        <button class="preset-btn" data-num="1" data-den="5">1/5</button>
      </div>
    </div>

    <!-- 하단 광고 영역 -->
    <div class="ad-slot ad-slot-bottom">
      <span class="ad-label">Advertisement</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
