  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "분수 시각화 도구",
    "description": "분수를 그림으로 보여주고 최대 6개까지 비교할 수 있는 초등학생용 무료 온라인 도구입니다.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <script src="/gnb.js"></script>
  <section class="tools_header">
    <h1>🍕 분수 시각화 도구</h1>
    <p>분수를 입력하면 그림으로 쉽게 비교할 수 있어요!</p>
  </section>

  <!-- 상단 광고 영역 -->
  <div class="ad-slot ad-slot-top">
    <span class="ad-label">Advertisement</span>
  </div>

  <section class="tools_main">
    <section class="input-section">
      <h2>✏️ 분수를 입력해 보세요</h2>
      <div class="fraction-inputs" id="fracInputs"></div>
      <div class="error-msg" id="errorMsg">⚠️ 분자와 분모를 모두 올바르게 입력해 주세요. (분모는 1 이상)</div>
      <div class="actions">
        <button class="btn-visualize" onclick="visualize()">🎨 그림으로 보기!</button>
        <button class="btn-reset" onclick="resetAll()">초기화</button>
      </div>
      <div class="quick-examples">
        <span>예시:</span>
        <button class="chip" onclick="loadExample([{n:1,d:2},{n:1,d:3}])">1/2 vs 1/3</button>
        <button class="chip" onclick="loadExample([{n:1,d:4},{n:2,d:4},{n:3,d:4}])">1/4, 2/4, 3/4</button>
        <button class="chip" onclick="loadExample([{n:1,d:2},{n:2,d:3},{n:3,d:4}])">1/2, 2/3, 3/4</button>
        <button class="chip" onclick="loadExample([{n:1,d:3},{n:1,d:6},{n:1,d:8}])">단위분수 비교</button>
      </div>
    </section>

    <section id="result">
      <div class="result-title">📊 분수 시각화 결과</div>
      <div class="fraction-cards" id="fracCards"></div>
      <div class="comparison-section">
        <h3>📏 크기 비교 막대</h3>
        <div class="comp-bar-wrap" id="compBars"></div>
      </div>
      <div class="rank-section">
        <h3>🏆 크기 순서</h3>
        <div class="rank-display" id="rankDisplay"></div>
        <div class="tip-box" id="tipBox"></div>
        <div class="common-denom-box" id="commonDenomBox" style="display:none"></div>
      </div>
    </section>
  </section>

  <section class="tools_footer">
    초등학생을 위한 분수 학습 도구 · 분수의 개념과 크기 비교를 시각적으로 쉽게 이해해요
  </section>

  <!-- 하단 광고 영역 -->
  <div class="ad-slot ad-slot-bottom">
    <span class="ad-label">Advertisement</span>
  </div>

  <script src="/cookie-consent.js"></script>
  <script src="script.js"></script>
</body>
</html>
