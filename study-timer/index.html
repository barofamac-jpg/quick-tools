  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "학습 타이머",
    "description": "공부 시간과 쉬는 시간을 정하면 원형 시계 그림으로 진행 상황을 보여주는 무료 학습 타이머입니다.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <script src="/gnb.js"></script>
  <section class="tools_header">
    <h1>⏱️ 학습 타이머</h1>
    <p>공부와 쉬는 시간을 정하고 집중해봐요!</p>
  </section>

  <div class="ad-slot ad-slot-top">
    <span class="ad-label">Advertisement</span>
  </div>

  <main class="game-main">
    <div class="layout-row">
      <section class="panel timer-panel">
        <h2>시간을 정해보세요</h2>
        <div class="size-row">
          <label for="studyInput">공부 시간(분)</label>
          <input type="number" id="studyInput" min="1" max="180" value="50" />
          <label for="breakInput">쉬는 시간(분)</label>
          <input type="number" id="breakInput" min="1" max="180" value="10" />
        </div>
        <div class="lock-row">
          <label class="lock-label">
            <input type="checkbox" id="repeatCheck" />
            <span>반복하기</span>
          </label>
        </div>

        <div class="timer-stage">
          <canvas id="timerCanvas" width="280" height="280"></canvas>
          <div class="timer-status">
            <div class="phase-label" id="phaseLabel">시작을 눌러주세요</div>
            <div class="time-label" id="timeLabel">50:00</div>
          </div>
        </div>

        <div class="ad-slot ad-slot-inline">
          <span class="ad-label">Advertisement</span>
        </div>

        <div class="button-row">
          <button id="toggleBtn" class="btn btn-primary">시작</button>
          <button id="resetBtn" class="btn btn-secondary" hidden>초기화</button>
        </div>
      </section>

      <section class="panel todo-panel">
        <h2>할 일 목록</h2>
        <div class="todo-input-row">
          <input type="text" id="todoInput" placeholder="할 일을 입력하세요" maxlength="60" />
          <button id="todoAddBtn" class="btn-add-todo">추가</button>
        </div>
        <p class="todo-count" id="todoCount">0/15</p>
        <ul class="todo-list" id="todoList"></ul>
        <button id="todoClearBtn" class="btn btn-secondary todo-clear-btn">모두 지우기</button>
      </section>
    </div>
  </main>

  <section class="tools_footer">
    초등학생을 위한 공부/쉬는시간 시각화 타이머
  </section>

  <div class="ad-slot ad-slot-bottom">
    <span class="ad-label">Advertisement</span>
  </div>

  <script src="/cookie-consent.js"></script>
  <script src="script.js"></script>
</body>
</html>
